name: "🧩 Tarefa / Melhoria Técnica"
description: "Descreva uma tarefa de refatoração, documentação ou ajuste técnico"
title: "[TASK] Descrição curta"
labels: ["task"]
assignees: []

body:
  - type: input
    id: goal
    attributes:
      label: "Objetivo"
      placeholder: "Ex: Refatorar componente de upload"
    validations:
      required: true

  - type: textarea
    id: details
    attributes:
      label: "Detalhes da tarefa"
      placeholder: "Explique o que precisa ser feito e por quê"

  - type: dropdown
    id: priority
    attributes:
      label: "Prioridade"
      options:
        - Baixa
        - Média
        - Alta
    validations:
      required: true

  - type: textarea
    id: acceptance_criteria
    attributes:
      label: "Critérios de aceite"
      placeholder: "O que define que a tarefa está completa?"
