services:
  database:
    image: postgres:17.5
    container_name: database
    ports:
      - 5432:5432
    environment:
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_DB=${DB_NAME}
    volumes:
      - database-data:/var/lib/postgresql/data
      - ./pg_hba.conf:/etc/pg_hba.conf:ro
    command: [ '-c', 'hba_file=/etc/pg_hba.conf' ]
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -h localhost -U bip" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    cpu_count: 2
    networks:
      bip-system-network:
        ipv4_address: 10.5.0.2

  mailhog:
    image: mailhog/mailhog:v1.0.1
    container_name: mailhog
    ports:
      - 1025:1025 # SMTP
      - 8025:8025 # Web UI
    user: root
    command: ["-storage=maildir", "-maildir-path=/maildir"]
    volumes:
      - mailhog-maildir:/maildir
    networks:
      bip-system-network:
        ipv4_address: 10.5.0.3

  api:
    image: localhost/bip:latest
    pull_policy: never
    container_name: api
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GOMAXPROCS
      - GOGC=off
      - GOMEMLIMIT
    command: ["-port=3000", "-db-dsn=${DB_DSN}", "-smtp-host=${SMTP_HOSTNAME}", "-smtp-port=${SMTP_PORT}"]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/v1/healthcheck || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 2
      start_period: 2s
    networks:
      bip-system-network:
        ipv4_address: 10.5.0.4
    depends_on:
      - database
      - mailhog

volumes:
  database-data: {}
  mailhog-maildir: {}

networks:
  bip-system-network:
    driver: bridge
    ipam:
      config:
        - subnet: 10.5.0.0/24