services:
  database:
    image: postgres:17.5
    container_name: database
    ports:
      - 5432:5432
    environment:
      - POSTGRES_PASSWORD=pa55word
      - POSTGRES_USER=bipc
      - POSTGRES_DB=bipc
    volumes:
      - database-data:/var/lib/postgresql/data
      - ./pg_hba.conf:/etc/pg_hba.conf:ro
    command: [ '-c', 'hba_file=/etc/pg_hba.conf' ]
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -h localhost -U bipc" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    cpu_count: 2
    networks:
      bipc-system-network:
        ipv4_address: 10.5.0.2

  mailhog:
    image: mailhog/mailhog:v1.0.1
    container_name: mailhog
    ports:
      - 1025:1025 # SMTP
      - 8025:8025 # Web UI
    user: root
    command: ["-storage=maildir", "-maildir-path=/maildir"]
    volumes:
      - mailhog-maildir:/maildir
    networks:
      bipc-system-network:
        ipv4_address: 10.5.0.3

  api:
    image: localhost/bipc:latest
    pull_policy: never
    container_name: api
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GOMAXPROCS
      - GOGC=off
      - GOMEMLIMIT
    command: [
      "-port=3000", "-db-dsn=postgres://bipc:pa55word@10.5.0.2:5432/bipc?sslmode=disable", "-smtp-host=10.5.0.3", "-smtp-port=1025", "-smtp-sender=\"BIPC <no-reply@yourdomain.com>\"",
      "-s3-endpoint=10.5.0.5:9000", "-s3-access-key=minioadmin", "-s3-secret-key=minioadmin", "-s3-secure=false", "-s3-bucket=bipc", "-s3-base-url=http://localhost:9000/bipc", "-cors-trusted-origins=http://localhost:5173"]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/v1/healthcheck || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 2
      start_period: 2s
    networks:
      bipc-system-network:
        ipv4_address: 10.5.0.4
    depends_on:
      - database
      - mailhog
      - minio

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    container_name: minio
    ports:
      - "9000:9000" # API
      - "9001:9001" # Console
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000/minio/health/live || exit 1"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    networks:
      bipc-system-network:
        ipv4_address: 10.5.0.5
  
volumes:
  database-data: {}
  mailhog-maildir: {}
  minio-data: {}

networks:
  bipc-system-network:
    driver: bridge
    ipam:
      config:
        - subnet: 10.5.0.0/24