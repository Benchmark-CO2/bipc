openapi: 3.1.0
info:
  title: BIPC
  description: Iterative Benchmark for Low-Carbon Projects
  version: 1.0.0
security:
  - apiKeyAuthentication: []
  - bearerHttpAuthentication: []
tags:
  - name: users
  - name: invitations
  - name: tokens

paths:
  /v1/users:
    post:
      summary: Register a new user
      description: Creates a new user account. After registration, an activation token is sent to the user's email.
      security: []
      tags: [users]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUser"
      responses:
        "202":
          description: Accepted. The user was successfully registered and an activation email has been sent.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "400":
          description: Bad Request. The request body is invalid or malformed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: Unprocessable Entity. The request failed validation checks (e.g., duplicate email).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal Server Error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      summary: Update user details
      description: Updates the details for the currently authenticated user. Requires authentication.
      tags: [users]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUser"
      responses:
        "200":
          description: OK. The user was successfully updated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "400":
          description: Bad Request. The request body is invalid or malformed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized. The user is not authenticated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Conflict. A conflicting edit occurred.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: Unprocessable Entity. The request failed validation checks (e.g., duplicate email).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal Server Error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      summary: Delete user account
      description: Deletes the currently authenticated user's account. To delete the account it is necessary to delete or transfer the projects.
      tags: [users]
      responses:
        "200":
          description: OK. The user was successfully deleted.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DefaultOkResponse"
        "403":
          description: Forbidden. The user cannot be deleted because they have associated projects.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized. The user is not authenticated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal Server Error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/users/activated:
    put:
      summary: Activate a user
      description: Activates a user account using a token sent to their email.
      security: []
      tags: [users]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - token
              properties:
                token:
                  type: string
      responses:
        "200":
          description: OK. User successfully activated.
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: "#/components/schemas/User"
        "400":
          description: Bad Request. The request body is invalid or malformed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Conflict. A conflicting edit occurred.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: Unprocessable Entity. The token is invalid or has expired.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal Server Error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/users/password:
    put:
      summary: Update user password
      description: Updates the password for a user, typically used in a password reset flow.
      security: []
      tags: [users]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - password
                - token
              properties:
                password:
                  type: string
                  format: password
                  description: The new password. Must be at least 8 bytes long.
                token:
                  type: string
      responses:
        "200":
          description: OK. Password successfully updated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DefaultOkResponse"
        "400":
          description: Bad Request. The request body is invalid or malformed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Conflict. A conflicting edit occurred.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: Unprocessable Entity. The token is invalid or has expired.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal Server Error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/users/collaborators:
    get:
      summary: List user collaborators
      description: Returns a list of users who have been invited to collaborate on the authenticated user's projects.
      tags: [users]
      responses:
        "200":
          description: A list of collaborators.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UsersList"
        "401":
          description: Unauthorized. The user is not authenticated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal Server Error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/users/pending-invitations:
    get:
      summary: List pending invitations
      description: Returns a list of pending invitations for the authenticated user.
      tags: [invitations]
      responses:
        "200":
          description: A list of pending invitations.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InvitationsWithDetails"
        "401":
          description: Unauthorized. The user is not authenticated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal Server Error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/users/reply/{invitationID}:
    put:
      summary: Reply to an invitation
      description: Accepts or declines an invitation to collaborate on a project.
      tags: [invitations]
      parameters:
        - name: invitationID
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - status
              properties:
                status:
                  type: string
                  enum:
                    - accepted
                    - declined
      responses:
        "403":
          description: Forbidden. account must be activated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized. The user is not authenticated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: Unprocessable Entity. The request failed validation checks
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "400":
          description: Bad Request. The request body is invalid or malformed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal Server Error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "200":
          description: OK. Invitation response recorded successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DefaultOkResponse"

  /v1/tokens/authentication:
    post:
      summary: Create authentication token
      description: Authenticates a user and returns a JWT token.
      security: []
      tags: [tokens]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                  format: password
      responses:
        "400":
          description: Bad Request. The request body is invalid or malformed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: Unprocessable Entity. The request failed validation checks.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized. Invalid credentials.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal Server Error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "201":
          description: Created. Token successfully created.
          content:
            application/json:
              schema:
                type: object
                required:
                  - authentication_token
                  - user
                properties:
                  authentication_token:
                    type: object
                    required:
                      - token
                      - expiry
                    properties:
                      token:
                        type: string
                      expiry:
                        type: string
                        format: date-time
                  user:
                    $ref: "#/components/schemas/User"

  /v1/tokens/activation:
    post:
      summary: Resend activation token
      description: Resends the activation token to the user's email.
      security: []
      tags: [tokens]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
              properties:
                email:
                  type: string
                  format: email
      responses:
        "202":
          description: OK. Activation email resent successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DefaultOkResponse"
        "400":
          description: Bad Request. The request body is invalid or malformed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: Unprocessable Entity. The request failed validation checks.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal Server Error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/projects:
    get:
      summary: List all projects
      description: Returns a paginated list of projects for the authenticated user.
      tags:
        - Projects
      security:
        - bearerAuth: []
      responses:
        "200":
          description: A paginated list of projects.
        "401":
          description: Unauthorized. The user is not authenticated.
        "422":
          description: Unprocessable Entity. The request failed validation checks.
        "500":
          description: Internal Server Error.
    post:
      summary: Create new project
      description: Creates a new project for the authenticated user.
      tags:
        - Projects
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Project"
      responses:
        "201":
          description: Created. The project was successfully created.
        "400":
          description: Bad Request. The request body is invalid or malformed.
        "401":
          description: Unauthorized. The user is not authenticated.
        "422":
          description: Unprocessable Entity. The request failed validation checks (e.g., duplicate project name).
        "500":
          description: Internal Server Error.

  /v1/projects/{projectID}:
    get:
      summary: Get a project by ID
      description: Retrieves the details of a specific project.
      tags:
        - Projects
      security:
        - bearerAuth: []
      parameters:
        - name: projectID
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: A single project.
        "401":
          description: Unauthorized. The user is not authenticated.
        "404":
          description: Not Found. The requested project does not exist.
        "500":
          description: Internal Server Error.
    patch:
      summary: Update a project
      description: Updates the details of a specific project.
      tags:
        - Projects
      security:
        - bearerAuth: []
      parameters:
        - name: projectID
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Project"
      responses:
        "200":
          description: OK. The project was successfully updated.
        "400":
          description: Bad Request. The request body is invalid or malformed.
        "401":
          description: Unauthorized. The user is not authenticated.
        "404":
          description: Not Found. The requested project does not exist.
        "409":
          description: Conflict. A conflicting edit occurred.
        "422":
          description: Unprocessable Entity. The request failed validation checks (e.g., duplicate project name).
        "500":
          description: Internal Server Error.
    delete:
      summary: Delete a project
      description: Deletes a specific project.
      tags:
        - Projects
      security:
        - bearerAuth: []
      parameters:
        - name: projectID
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: OK. The project was successfully deleted.
        "401":
          description: Unauthorized. The user is not authenticated.
        "404":
          description: Not Found. The requested project does not exist.
        "500":
          description: Internal Server Error.

  /v1/projects/{projectID}/invite:
    post:
      summary: Invite a user to a project
      description: Sends an invitation to a user to collaborate on a project.
      tags:
        - Invitations
      security:
        - bearerAuth: []
      parameters:
        - name: projectID
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  format: email
                permissions:
                  type: array
                  items:
                    type: string
      responses:
        "200":
          description: OK. Invitation sent successfully.
        "400":
          description: Bad Request. The request body is invalid or malformed.
        "401":
          description: Unauthorized. The user is not authenticated.
        "422":
          description: Unprocessable Entity. The request failed validation checks (e.g., user already a member, or pending invitation exists).
        "500":
          description: Internal Server Error.

  /v1/projects/{projectID}/units:
    post:
      summary: Create new unit
      description: Creates a new unit (e.g., a tower) within a project.
      tags:
        - Units
      security:
        - bearerAuth: []
      parameters:
        - name: projectID
          in: path
          required: true
          description: The ID of the project to add the unit to.
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UnitCreate"
      responses:
        "200":
          description: OK. The unit was created successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Unit"
        "400":
          description: Bad Request. The request body is invalid or malformed.
        "401":
          description: Unauthorized. The user is not authenticated.
        "422":
          description: Unprocessable Entity. The request failed validation checks.
        "500":
          description: Internal Server Error.

  /v1/projects/{projectID}/units/{unitID}:
    get:
      summary: Get a unit by ID
      description: Retrieves the details of a specific unit.
      tags:
        - Units
      security:
        - bearerAuth: []
      parameters:
        - name: projectID
          in: path
          required: true
          description: The ID of the project.
          schema:
            type: string
            format: uuid
        - name: unitID
          in: path
          required: true
          description: The ID of the unit to retrieve.
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: A single unit.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Unit"
        "401":
          description: Unauthorized. The user is not authenticated.
        "404":
          description: Not Found. The requested unit does not exist.
        "500":
          description: Internal Server Error.
    patch:
      summary: Update a unit
      description: Updates the details of a specific unit.
      tags:
        - Units
      security:
        - bearerAuth: []
      parameters:
        - name: projectID
          in: path
          required: true
          description: The ID of the project.
          schema:
            type: string
            format: uuid
        - name: unitID
          in: path
          required: true
          description: The ID of the unit to update.
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UnitCreate"
      responses:
        "200":
          description: OK. The unit was successfully updated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Unit"
        "400":
          description: Bad Request. The request body is invalid or malformed.
        "401":
          description: Unauthorized. The user is not authenticated.
        "404":
          description: Not Found. The requested unit does not exist.
        "409":
          description: Conflict. A conflicting edit occurred.
        "422":
          description: Unprocessable Entity. The request failed validation checks.
        "500":
          description: Internal Server Error.
    delete:
      summary: Delete a unit
      description: Deletes a specific unit.
      tags:
        - Units
      security:
        - bearerAuth: []
      parameters:
        - name: projectID
          in: path
          required: true
          description: The ID of the project.
          schema:
            type: string
            format: uuid
        - name: unitID
          in: path
          required: true
          description: The ID of the unit to delete.
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: OK. The unit was successfully deleted.
        "401":
          description: Unauthorized. The user is not authenticated.
        "404":
          description: Not Found. The requested unit does not exist.
        "500":
          description: Internal Server Error.

  /v1/projects/{projectID}/units/{unitID}/options:
    post:
      summary: Create a new engineering option for a tower
      tags:
        - Options
      security:
        - bearerAuth: []
      parameters:
        - name: projectID
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: unitID
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OptionCreateRequest"
      responses:
        "201":
          description: unit option created successfully
    get:
      summary: List all options for a unit
      tags:
        - Options
      security:
        - bearerAuth: []
      parameters:
        - name: projectID
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: unitID
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: A list of options
  /v1/projects/{projectID}/units/{unitID}/options/{optionID}:
    get:
      summary: Get a unit option by ID
      tags:
        - Options
      security:
        - bearerAuth: []
      parameters:
        - name: projectID
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: unitID
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: optionID
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: A single unit option
        "404":
          description: Not Found.
    patch:
      summary: Update a unit option
      tags:
        - Options
      security:
        - bearerAuth: []
      parameters:
        - name: projectID
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: unitID
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: optionID
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OptionCreateRequest"
      responses:
        "200":
          description: Successfully updated
        "404":
          description: Not Found.
        "409":
          description: Conflict. A conflicting edit occurred.
    delete:
      summary: Delete a unit option
      tags:
        - Options
      security:
        - bearerAuth: []
      parameters:
        - name: projectID
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: unitID
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: optionID
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Successfully deleted
        "404":
          description: Not Found.

  /v1/projects/{projectID}/units/{unitID}/options/{optionID}/modules:
    post:
      summary: Create a new module for a unit option
      tags:
        - Modules
      parameters:
        - name: projectID
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: unitID
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: optionID
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ModuleCreateRequest"
      responses:
        "201":
          description: Module created successfully

  /v1/projects/{projectID}/units/{unitID}/options/{optionID}/modules/{moduleID}:
    get:
      summary: Get a module by ID
      tags:
        - Modules
      parameters:
        - name: projectID
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: unitID
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: optionID
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: moduleID
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: A single module
    delete:
      summary: Delete a module
      tags:
        - Modules
      parameters:
        - name: projectID
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: unitID
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: optionID
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: moduleID
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Successfully deleted
    patch:
      summary: Update a module
      tags:
        - Modules
      parameters:
        - name: projectID
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: unitID
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: optionID
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: moduleID
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ModuleCreateRequest"
      responses:
        "200":
          description: module successfully updated

components:
  securitySchemes:
    bearerHttpAuthentication:
      type: http
      scheme: bearer
      bearerFormat: opaque
    apiKeyAuthentication:
      type: apiKey
      in: header
      name: X-API-Key
  schemas:
    ErrorResponse:
      type: object
      required:
        - error
      properties:
        error:
          oneOf:
            - type: string
            - type: object
              additionalProperties:
                type: string

    DefaultOkResponse:
      type: object
      required:
        - message
      properties:
        message:
          type: string

    CreateUser:
      type: object
      required:
        - name
        - email
        - password
      properties:
        name:
          type: string
        email:
          type: string
          format: email
        password:
          type: string
          format: password
        crea_cau:
          type: string
          description: CREA or CAU registration number
        birthdate:
          type: string
          format: date-time
        city:
          type: string
        activity:
          type: string
        enterprise:
          type: string

    User:
      allOf:
        - $ref: "#/components/schemas/CreateUser"
        - type: object
          required:
            - id
            - created_at
            - activated
          properties:
            id:
              type: string
              format: uuid
              readOnly: true
            created_at:
              type: string
              format: date-time
              readOnly: true
            activated:
              type: boolean
              readOnly: true

    UsersList:
      type: array
      items:
        $ref: "#/components/schemas/User"

    UpdateUser:
      type: object
      properties:
        name:
          type: string
          description: "User's full name."
        email:
          type: string
          format: email
        password:
          type: string
          format: password
          description: "User's new password. Must be at least 8 characters long."
        crea_cau:
          type: string
          description: CREA or CAU registration number
        birthdate:
          type: string
          format: date-time
        city:
          type: string
        activity:
          type: string
        enterprise:
          type: string

    InvitationsWithDetails:
      type: object
      required:
        - invitations
      properties:
        invitations:
          type: array
          items:
            type: object
            required:
              - id
              - status
              - created_at
              - expires_at
              - inviter_id
              - project_id
              - email
              - inviter_name
              - project_name
            properties:
              id:
                type: string
                format: uuid
              status:
                type: string
                enum:
                  - accepted
                  - declined
              created_at:
                type: string
                format: date-time
              expires_at:
                type: string
                format: date-time
              inviter_id:
                type: string
                format: uuid
              project_id:
                type: string
                format: uuid
              email:
                type: string
                format: email
              inviter_name:
                type: string
              project_name:
                type: string

    Project:
      type: object
      properties:
        name:
          type: string
        zip_code:
          type: string
        state:
          type: string
        city:
          type: string
        neighborhood:
          type: string
        street:
          type: string
        number:
          type: string
        phase:
          type: string
        description:
          type: string
        image_url:
          type: string
      required:
        - name
        - state
        - city
        - phase

    # --- Unit & Tower Schemas (based on new_db2.sql) ---
    Unit:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        project_id:
          type: string
          format: uuid
          readOnly: true
        name:
          type: string
          example: "Main Tower"
        type:
          type: string
          example: "tower"

    Tower:
      allOf:
        - $ref: "#/components/schemas/Unit"
        - type: object
          properties:
            created_at:
              type: string
              format: date-time
              readOnly: true
            updated_at:
              type: string
              format: date-time
              readOnly: true
            version:
              type: integer
              readOnly: true
            floors:
              type: array
              items:
                $ref: "#/components/schemas/Floor"

    FloorGroup:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        name:
          type: string
          example: "Standard Floors"
        floors:
          type: array
          items:
            $ref: "#/components/schemas/Floor"

    Floor:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        index:
          type: integer
          description: "The floor number/index (e.g., -1 for basement, 1 for first floor)."
          example: 1
        area:
          type: number
          format: float
          example: 450.5
        height:
          type: number
          format: float
          example: 2.8
        group_name:
          type: string
          description: "The name of the floor group this floor belongs to."
          example: "Basement Floors"

    UnitCreate:
      type: object
      required:
        - name
        - type
        - data
      properties:
        name:
          type: string
          example: "Main Tower"
        type:
          type: string
          enum: [tower]
        data:
          description: "Polymorphic data based on the unit type."
          oneOf:
            - $ref: "#/components/schemas/TowerCreateData"

    TowerCreateData:
      type: object
      required:
        - floor_groups
      properties:
        floor_groups:
          type: array
          items:
            $ref: "#/components/schemas/FloorGroupCreate"

    FloorGroupCreate:
      type: object
      required:
        - name
        - area
        - height
        - repetition
      properties:
        name:
          type: string
        example: "Typical Floor"
        area:
          type: number
          format: float
          example: 500.0
        height:
          type: number
          format: float
          example: 3.0
        repetition:
          type: integer
          example: 10
        category:
          type: string
          enum: [basement_floor, penthouse_floor, ground_floor, standard_floor]

    OptionCreateRequest:
      type: object
      properties:
        name:
          type: string
        active:
          type: boolean
      required:
        - name
        - active

    # --- Module Schemas ---
    ModuleCreateRequest:
      type: object
      description: "Request body for creating a new structural module. A module represents a specific structural system (e.g., beam-column or concrete wall) applied to a set of floors within a unit option."
      properties:
        type:
          type: string
          description: "The type of structural module."
          enum: [beam_column, concrete_wall]
        data:
          description: "Polymorphic data containing the specific details for the chosen module type. The structure of this object depends on the 'type' field."
          oneOf:
            - $ref: "#/components/schemas/BeamColumnData"
            - $ref: "#/components/schemas/ConcreteWallData"
      required:
        - type
        - floor_ids
        - data
      example:
        type: "beam_column"
        floor_ids:
          [
            "f1a2b3c4-d5e6-f7a8-b9c0-d1e2f3a4b5c6",
            "e7f8a9b0-c1d2-e3f4-a5b6-c7d8e9f0a1b2",
          ]
        data:
          concrete_columns:
            volumes:
              - fck: 30
                volume: 150.5
              - fck: 35
                volume: 50.0
            steel:
              - ca: 50
                mass: 7500
              - ca: 60
                mass: 1200
          concrete_beams:
            volumes:
              - fck: 30
                volume: 200.0
            steel:
              - ca: 50
                mass: 10000
              - ca: 60
                mass: 1500
          concrete_slabs:
            volumes:
              - fck: 25
                volume: 450.0
            steel:
              - ca: 50
                mass: 22500
          form_columns: 1200
          form_beams: 2500
          form_slabs: 9000
          column_number: 120
          avg_beam_span: 6
          avg_slab_span: 5

    # Schema for a single concrete volume item
    ConcreteVolumeItem:
      type: object
      properties:
        fck:
          type: integer
          description: "Characteristic compressive strength of concrete in MPa (Megapascals)."
          enum: [20, 25, 30, 35, 40, 45]
        volume:
          type: number
          format: float
          description: "Volume of concrete with the specified fck in cubic meters (m³)."
      required:
        - fck
        - volume

    # Schema for the array of concrete volumes
    ConcreteVolumes:
      type: array
      description: "An array defining concrete volumes, broken down by compressive strength (fck)."
      minItems: 1
      items:
        $ref: "#/components/schemas/ConcreteVolumeItem"

    # Schema for a single steel mass item
    SteelMassItem:
      type: object
      properties:
        ca:
          type: integer
          description: "The type of CA steel reinforcement."
          enum: [50, 60]
        mass:
          type: number
          format: float
          description: "Total mass of steel reinforcement in kilograms (kg)."
      required:
        - ca
        - mass

    # Schema for the array of steel masses
    SteelMasses:
      type: array
      description: "An array defining steel reinforcement mass, broken down by type."
      items:
        $ref: "#/components/schemas/SteelMass"

    # Schema for the concrete element, with consistent references
    ConcreteElement:
      type: object
      description: "Defines the composition of a concrete structural element, including its steel reinforcement and concrete volumes."
      properties:
        volumes:
          $ref: "#/components/schemas/ConcreteVolumes"
        steel:
          $ref: "#/components/schemas/SteelMasses"
      required:
        - volumes
        - steel

    BeamColumnData:
      type: object
      description: "Data for a 'beam_column' type module."
      properties:
        floor_ids:
          type: array
          description: "Array of floor IDs to which this module will be applied. These floors must belong to the tower associated with this unit option."
          items:
            type: string
            format: uuid
            example: "a1b2c3d4-e5f6-7890-1234-567890abcdef"
        concrete_columns:
          description: "Concrete and steel composition for all columns in the specified floors."
          allOf:
            - $ref: "#/components/schemas/ConcreteElement"
        concrete_beams:
          description: "Concrete and steel composition for all beams in the specified floors."
          allOf:
            - $ref: "#/components/schemas/ConcreteElement"
        concrete_slabs:
          description: "Concrete and steel composition for all slabs in the specified floors."
          allOf:
            - $ref: "#/components/schemas/ConcreteElement"
        form_columns:
          type: number
          description: "Total area of concrete forms for columns in square meters (m²)."
          example: 1250.5
        form_beams:
          type: number
          description: "Total area of concrete forms for beams in square meters (m²)."
          example: 2500.0
        form_slabs:
          type: number
          description: "Total area of concrete forms for slabs in square meters (m²)."
          example: 9000.0
        column_number:
          type: integer
          description: "Total number of columns in the specified floors."
          example: 120
        avg_beam_span:
          type: integer
          description: "Average span between beams in meters (m)."
          example: 6
        avg_slab_span:
          type: integer
          description: "Average span of slabs in meters (m)."
          example: 5
      required:
        - concrete_columns
        - concrete_beams
        - concrete_slabs

    ConcreteWallData:
      type: object
      description: "Data for a 'concrete_wall' type module."
      properties:
        floor_ids:
          type: array
          description: "Array of floor IDs to which this module will be applied. These floors must belong to the tower associated with this unit option."
          items:
            type: string
            format: uuid
            example: "a1b2c3d4-e5f6-7890-1234-567890abcdef"
        concrete_walls:
          description: "Concrete and steel composition for all walls in the specified floors."
          allOf:
            - $ref: "#/components/schemas/ConcreteElement"
        concrete_slabs:
          description: "Concrete and steel composition for all slabs in the specified floors."
          allOf:
            - $ref: "#/components/schemas/ConcreteElement"
        wall_thickness:
          type: number
          description: "Average thickness of the concrete walls in meters (m)."
          example: 0.20
        slab_thickness:
          type: number
          description: "Average thickness of the concrete slabs in meters (m)."
          example: 0.15
        wall_area:
          type: number
          description: "Total area of the concrete walls in square meters (m²)."
          example: 3000
        slab_area:
          type: number
          description: "Total area of the concrete slabs in square meters (m²)."
          example: 15000
        wall_form_area:
          type: number
          description: "Total area of concrete forms for walls in square meters (m²)."
          example: 6000
        slab_form_area:
          type: number
          description: "Total area of concrete forms for slabs in square meters (m²)."
          example: 30000
      required:
        - concrete_walls
        - concrete_slabs
