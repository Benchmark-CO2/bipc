components:
  securitySchemes:
    bearerHttpAuthentication:
      type: http
      scheme: bearer
      bearerFormat: opaque
    apiKeyAuthentication:
      type: apiKey
      in: header
      name: X-API-Key
  schemas:
    ErrorResponse:
      type: object
      required:
        - error
      properties:
        error:
          oneOf:
            - type: string
            - type: object
              additionalProperties:
                type: string

    DefaultOkResponse:
      type: object
      required:
        - message
      properties:
        message:
          type: string

    CreateUser:
      type: object
      required:
        - name
        - email
        - password
      properties:
        name:
          type: string
        email:
          type: string
          format: email
        password:
          type: string
          format: password
        crea_cau:
          type: string
          description: CREA or CAU registration number
        birthdate:
          type: string
          format: date
        city:
          type: string
        activity:
          type: string
        enterprise:
          type: string

    User:
      allOf:
        - $ref: "#/components/schemas/CreateUser"
        - type: object
          required:
            - id
            - created_at
            - activated
          properties:
            id:
              type: string
              format: uuid
              readOnly: true
            created_at:
              type: string
              format: date-time
              readOnly: true
            activated:
              type: boolean
              readOnly: true

    UpdateUser:
      type: object
      properties:
        name:
          type: string
          description: "User's full name."
        email:
          type: string
          format: email
        password:
          type: string
          format: password
          description: "User's new password. Must be at least 8 characters long."
        crea_cau:
          type: string
          description: CREA or CAU registration number
        birthdate:
          type: string
          format: date-time
        city:
          type: string
        activity:
          type: string
        enterprise:
          type: string

    InvitationsWithDetails:
      type: object
      required:
        - invitations
      properties:
        invitations:
          type: array
          items:
            type: object
            required:
              - id
              - status
              - created_at
              - expires_at
              - inviter_id
              - project_id
              - email
              - inviter_name
              - project_name
            properties:
              id:
                type: string
                format: uuid
              status:
                type: string
                enum:
                  - accepted
                  - declined
              created_at:
                type: string
                format: date-time
              expires_at:
                type: string
                format: date-time
              inviter_id:
                type: string
                format: uuid
              project_id:
                type: string
                format: uuid
              email:
                type: string
                format: email
              inviter_name:
                type: string
              project_name:
                type: string

    CreateProject:
      type: object
      required:
        - name
        - state
        - city
        - phase
      properties:
        name:
          type: string
        cep:
          type: string
        state:
          type: string
        city:
          type: string
        neighborhood:
          type: string
        street:
          type: string
        number:
          type: string
        phase:
          type: string
        description:
          type: string

    UpdateProject:
      type: object
      properties:
        name:
          type: string
        cep:
          type: string
        state:
          type: string
        city:
          type: string
        neighborhood:
          type: string
        street:
          type: string
        number:
          type: string
        phase:
          type: string
        description:
          type: string

    Project:
      allOf:
        - $ref: "#/components/schemas/CreateProject"
        - type: object
          required:
            - id
            - created_at
            - benchmark
          properties:
            id:
              type: string
              format: uuid
              readOnly: true
            created_at:
              type: string
              format: date-time
              readOnly: true
            benchmark:
              type: boolean
              readOnly: true

    ProjectWithUnits:
      allOf:
        - $ref: "#/components/schemas/Project"
        - type: object
          properties:
            is_administrator:
              type: boolean
              readOnly: true
            units:
              type: array
              readOnly: true
              items:
                $ref: "#/components/schemas/ProjectUnit"
            consumptions:
              type: object
              readOnly: true
              additionalProperties:
                $ref: "#/components/schemas/Consumption"
            area:
              type: number
              format: float
              readOnly: true

    ProjectUnit:
      type: object
      required:
        - id
        - name
        - type
        - area
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        name:
          type: string
          readOnly: true
        type:
          type: string
          readOnly: true
        area:
          type: number
          format: float
          readOnly: true
        consumptions:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/Consumption"

    Consumption:
      type: object
      properties:
        co2_min:
          type: number
          format: float
          readOnly: true
        co2_max:
          type: number
          format: float
          readOnly: true
        energy_min:
          type: number
          format: float
          readOnly: true
        energy_max:
          type: number
          format: float
          readOnly: true

    # --- Unit & Tower Schemas (based on new_db2.sql) ---
    Unit:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        project_id:
          type: string
          format: uuid
          readOnly: true
        name:
          type: string
          example: "Main Tower"
        type:
          type: string
          example: "tower"

    Tower:
      allOf:
        - $ref: "#/components/schemas/Unit"
        - type: object
          properties:
            created_at:
              type: string
              format: date-time
              readOnly: true
            updated_at:
              type: string
              format: date-time
              readOnly: true
            version:
              type: integer
              readOnly: true
            floors:
              type: array
              items:
                $ref: "#/components/schemas/Floor"

    FloorGroup:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        name:
          type: string
          example: "Standard Floors"
        floors:
          type: array
          items:
            $ref: "#/components/schemas/Floor"

    Floor:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        index:
          type: integer
          description: "The floor number/index (e.g., -1 for basement, 1 for first floor)."
          example: 1
        area:
          type: number
          format: float
          example: 450.5
        height:
          type: number
          format: float
          example: 2.8
        group_name:
          type: string
          description: "The name of the floor group this floor belongs to."
          example: "Basement Floors"

    UnitCreate:
      type: object
      required:
        - name
        - type
        - data
      properties:
        name:
          type: string
          example: "Main Tower"
        type:
          type: string
          enum: [tower]
        data:
          description: "Polymorphic data based on the unit type."
          oneOf:
            - $ref: "#/components/schemas/TowerCreateData"

    TowerCreateData:
      type: object
      required:
        - floors
      properties:
        floors:
          type: array
          description: "Array of individual floors. Each floor must have a unique index and consecutive indexes starting from 1."
          minItems: 1
          items:
            $ref: "#/components/schemas/FloorCreate"

    FloorCreate:
      type: object
      required:
        - floor_group
        - category
        - area
        - height
        - index
      properties:
        id:
          type: string
          format: uuid
          description: "Optional UUID for the floor. If not provided, will be auto-generated."
        floor_group:
          type: string
          description: "Name of the floor group this floor belongs to (e.g., 'Standard Floors', 'Basement')."
          example: "Standard Floors"
        category:
          type: string
          description: "Category of the floor."
          enum: [basement_floor, penthouse_floor, ground_floor, standard_floor]
          example: "standard_floor"
        area:
          type: number
          format: float
          description: "Floor area in square meters (m²)."
          example: 500.0
        height:
          type: number
          format: float
          description: "Floor height in meters (m)."
          example: 3.0
        index:
          type: integer
          description: "Floor index/number. Must be unique and consecutive (no gaps). Typically starts at 1."
          example: 1

    OptionCreateRequest:
      type: object
      properties:
        name:
          type: string
        active:
          type: boolean
      required:
        - name
        - active

    # --- Module Schemas ---
    ModuleCreateRequest:
      type: object
      description: "Request body for creating a new structural module. A module represents a specific structural system (e.g., beam-column or concrete wall) applied to a set of floors within a unit option."
      properties:
        type:
          type: string
          description: "The type of structural module."
          enum: [beam_column, concrete_wall, structural_masonry, raft_foundation, piles_foundation, raft_piles_foundation]
        data:
          description: "Polymorphic data containing the specific details for the chosen module type. The structure of this object depends on the 'type' field."
          oneOf:
            - $ref: "#/components/schemas/BeamColumnData"
            - $ref: "#/components/schemas/ConcreteWallData"
            - $ref: "#/components/schemas/StructuralMasonryData"
            - $ref: "#/components/schemas/RaftFoundationData"
            - $ref: "#/components/schemas/PilesFoundationData"
            - $ref: "#/components/schemas/RaftPilesFoundationData"
      required:
        - type
        - data

    # Schema for a single concrete volume item
    ConcreteVolumeItem:
      type: object
      properties:
        fck:
          type: integer
          description: "Characteristic compressive strength of concrete in MPa (Megapascals)."
          enum: [20, 25, 30, 35, 40, 45]
        volume:
          type: number
          format: float
          description: "Volume of concrete with the specified fck in cubic meters (m³)."
      required:
        - fck
        - volume

    # Schema for the array of concrete volumes
    ConcreteVolumes:
      type: array
      description: "An array defining concrete volumes, broken down by compressive strength (fck)."
      minItems: 1
      items:
        $ref: "#/components/schemas/ConcreteVolumeItem"

    # Schema for a single steel material item
    SteelMaterial:
      type: object
      description: "Defines a steel reinforcement material with its type, resistance characteristics, and mass."
      properties:
        material:
          type: string
          description: "The type of steel material."
          enum: [general, rebar, mesh, strand, other]
          example: "rebar"
        other_name:
          type: string
          description: "Custom material name. Required when material is 'other'."
          example: "Custom Steel Type"
        resistance:
          type: string
          description: "The resistance/strength classification of the steel."
          enum: [CA50, CA60, CP190, other]
          example: "CA50"
        other_resistance:
          type: number
          format: float
          description: "Custom resistance value in MPa. Required when resistance is 'other'."
          example: 500.0
        mass:
          type: number
          format: float
          description: "Total mass of steel reinforcement in kilograms (kg)."
          example: 22500.0
      required:
        - material
        - resistance
        - mass

    # Schema for the array of steel materials
    SteelMaterials:
      type: array
      description: "An array defining steel reinforcement materials, broken down by type and resistance."
      items:
        $ref: "#/components/schemas/SteelMaterial"

    # Schema for the concrete element, with consistent references
    ConcreteElement:
      type: object
      description: "Defines the composition of a concrete structural element, including its steel reinforcement and concrete volumes."
      properties:
        volumes:
          $ref: "#/components/schemas/ConcreteVolumes"
        steel:
          $ref: "#/components/schemas/SteelMaterials"
      required:
        - volumes
        - steel

    BeamColumnData:
      type: object
      description: "Data for a 'beam_column' type module."
      properties:
        floor_ids:
          type: array
          description: "Array of floor IDs to which this module will be applied. These floors must belong to the unit associated with this option."
          items:
            type: string
            format: uuid
          minItems: 1
        concrete_columns:
          description: "Concrete and steel composition for all columns in the specified floors."
          allOf:
            - $ref: "#/components/schemas/ConcreteElement"
        concrete_beams:
          description: "Concrete and steel composition for all beams in the specified floors."
          allOf:
            - $ref: "#/components/schemas/ConcreteElement"
        concrete_slabs:
          description: "Concrete and steel composition for all slabs in the specified floors."
          allOf:
            - $ref: "#/components/schemas/ConcreteElement"
        form_columns:
          type: number
          description: "Total area of concrete forms for columns in square meters (m²)."
          example: 1250.5
        form_beams:
          type: number
          description: "Total area of concrete forms for beams in square meters (m²)."
          example: 2500.0
        form_slabs:
          type: number
          description: "Total area of concrete forms for slabs in square meters (m²)."
          example: 9000.0
        form_total:
          type: number
          description: "Total area of all concrete forms (columns + beams + slabs) in square meters (m²)."
          example: 12750.5
        column_number:
          type: integer
          description: "Total number of columns in the specified floors."
          example: 120
        avg_beam_span:
          type: number
          description: "Average span between beams in meters (m)."
          example: 6.0
        avg_slab_span:
          type: number
          description: "Average span of slabs in meters (m)."
          example: 5.0
      required:
        - floor_ids
        - concrete_columns
        - concrete_beams
        - concrete_slabs

    ConcreteWallData:
      type: object
      description: "Data for a 'concrete_wall' type module."
      properties:
        floor_ids:
          type: array
          description: "Array of floor IDs to which this module will be applied. These floors must belong to the tower associated with this unit option."
          items:
            type: string
            format: uuid
            example: "a1b2c3d4-e5f6-7890-1234-567890abcdef"
        concrete_walls:
          description: "Concrete and steel composition for all walls in the specified floors."
          allOf:
            - $ref: "#/components/schemas/ConcreteElement"
        concrete_slabs:
          description: "Concrete and steel composition for all slabs in the specified floors."
          allOf:
            - $ref: "#/components/schemas/ConcreteElement"
        wall_thickness:
          type: number
          description: "Average thickness of the concrete walls in meters (m)."
          example: 0.20
        slab_thickness:
          type: number
          description: "Average thickness of the concrete slabs in meters (m)."
          example: 0.15
        wall_area:
          type: number
          description: "Total area of the concrete walls in square meters (m²)."
          example: 3000
        slab_area:
          type: number
          description: "Total area of the concrete slabs in square meters (m²)."
          example: 15000
        wall_form_area:
          type: number
          description: "Total area of concrete forms for walls in square meters (m²)."
          example: 6000
        slab_form_area:
          type: number
          description: "Total area of concrete forms for slabs in square meters (m²)."
          example: 30000
      required:
        - concrete_walls
        - concrete_slabs

    StructuralMasonryData:
      type: object
      description: "Data for a 'structural_masonry' type module. Structural masonry combines concrete structural elements (columns, beams, slabs) with masonry block construction."
      properties:
        floor_ids:
          type: array
          description: "Array of floor IDs to which this module will be applied."
          items:
            type: string
            format: uuid
          minItems: 1
        concrete_columns:
          description: "Concrete and steel composition for columns."
          allOf:
            - $ref: "#/components/schemas/ConcreteElement"
        concrete_beams:
          description: "Concrete and steel composition for beams."
          allOf:
            - $ref: "#/components/schemas/ConcreteElement"
        concrete_slabs:
          description: "Concrete and steel composition for slabs."
          allOf:
            - $ref: "#/components/schemas/ConcreteElement"
        form_columns:
          type: number
          description: "Total area of concrete forms for columns in m²."
          example: 1200
        form_beams:
          type: number
          description: "Total area of concrete forms for beams in m²."
          example: 2500
        form_slabs:
          type: number
          description: "Total area of concrete forms for slabs in m²."
          example: 9000
        form_total:
          type: number
          description: "Total area of all concrete forms in m²."
          example: 12700
        masonry:
          type: object
          description: "Masonry elements including grout, mortar, and blocks."
          properties:
            grout:
              type: array
              description: "Array of grout information for vertical or horizontal filling."
              items:
                type: object
                properties:
                  position:
                    type: string
                    enum: [vertical, horizontal]
                    description: "Position of grout application."
                  volumes:
                    type: array
                    description: "Array of grout volumes by compressive strength (fgk)."
                    items:
                      type: object
                      properties:
                        fgk:
                          type: integer
                          description: "Grout compressive strength in MPa."
                          example: 15
                        volume:
                          type: number
                          format: float
                          description: "Volume of grout in m³."
                          example: 10.5
                      required: [fgk, volume]
                  steel:
                    $ref: "#/components/schemas/SteelMaterials"
                required: [position, volumes]
            mortar:
              type: array
              description: "Array of mortar volumes by compressive strength (fak)."
              items:
                type: object
                properties:
                  fak:
                    type: number
                    format: float
                    description: "Mortar compressive strength in MPa."
                    example: 8.5
                  volume:
                    type: number
                    format: float
                    description: "Volume of mortar in m³."
                    example: 15.0
                required: [fak, volume]
            blocks:
              type: array
              description: "Array of masonry blocks by type and strength."
              items:
                type: object
                properties:
                  type:
                    type: string
                    description: "Type of masonry block."
                    example: "inteiro (14x19x39)"
                  fbk:
                    type: integer
                    description: "Block compressive strength in MPa."
                    example: 8
                  quantity:
                    type: integer
                    description: "Number of blocks."
                    example: 5000
                required: [type, fbk, quantity]
          required: [grout, mortar, blocks]
      required:
        - floor_ids
        - concrete_columns
        - concrete_beams
        - concrete_slabs
        - masonry

    RaftFoundationData:
      type: object
      description: "Data for a 'raft_foundation' type module. A raft foundation is a continuous concrete slab that extends over the entire building footprint."
      properties:
        unit_id:
          type: string
          format: uuid
          description: "ID of the unit this foundation belongs to."
        area:
          type: number
          format: float
          description: "Total area of the raft foundation in m²."
          example: 500.0
        thickness:
          type: number
          format: float
          description: "Thickness of the raft slab in meters."
          example: 0.30
        fck:
          type: integer
          description: "Characteristic compressive strength of concrete in MPa."
          enum: [20, 25, 30, 35, 40, 45]
          example: 30
        steel:
          $ref: "#/components/schemas/SteelMaterials"
      required:
        - unit_id
        - area
        - thickness
        - fck
        - steel

    PilesFoundationData:
      type: object
      description: "Data for a 'piles_foundation' type module. A piles foundation uses deep vertical elements to transfer loads to deeper soil layers."
      properties:
        unit_id:
          type: string
          format: uuid
          description: "ID of the unit this foundation belongs to."
        fck:
          type: integer
          description: "Characteristic compressive strength of concrete in MPa."
          enum: [20, 25, 30, 35, 40, 45]
          example: 30
        piles:
          type: object
          description: "Pile elements."
          properties:
            volume:
              type: number
              format: float
              description: "Total volume of pile concrete in m³."
              example: 50.0
            steel:
              $ref: "#/components/schemas/SteelMaterials"
          required: [volume, steel]
        blocks:
          type: object
          description: "Pile cap blocks."
          properties:
            volume:
              type: number
              format: float
              description: "Total volume of block concrete in m³."
              example: 30.0
            steel:
              $ref: "#/components/schemas/SteelMaterials"
          required: [volume, steel]
        grade_beams:
          type: object
          description: "Grade beams connecting pile caps."
          properties:
            volume:
              type: number
              format: float
              description: "Total volume of grade beam concrete in m³."
              example: 20.0
            steel:
              $ref: "#/components/schemas/SteelMaterials"
          required: [volume, steel]
        tie_beams:
          type: object
          description: "Tie beams for lateral stability."
          properties:
            volume:
              type: number
              format: float
              description: "Total volume of tie beam concrete in m³."
              example: 15.0
            steel:
              $ref: "#/components/schemas/SteelMaterials"
          required: [volume, steel]
      required:
        - unit_id
        - fck
        - piles
        - blocks
        - grade_beams
        - tie_beams

    RaftPilesFoundationData:
      type: object
      description: "Data for a 'raft_piles_foundation' type module. Combines a raft foundation with supporting piles for higher load capacity."
      properties:
        unit_id:
          type: string
          format: uuid
          description: "ID of the unit this foundation belongs to."
        fck:
          type: integer
          description: "Characteristic compressive strength of concrete in MPa."
          enum: [20, 25, 30, 35, 40, 45]
          example: 30
        raft:
          type: object
          description: "Raft slab component."
          properties:
            area:
              type: number
              format: float
              description: "Total area of the raft in m²."
              example: 500.0
            thickness:
              type: number
              format: float
              description: "Thickness of the raft slab in meters."
              example: 0.30
            steel:
              $ref: "#/components/schemas/SteelMaterials"
          required: [area, thickness, steel]
        piles:
          type: object
          description: "Supporting piles component."
          properties:
            volume:
              type: number
              format: float
              description: "Total volume of pile concrete in m³."
              example: 40.0
            steel:
              $ref: "#/components/schemas/SteelMaterials"
          required: [volume, steel]
      required:
        - unit_id
        - fck
        - raft
        - piles
