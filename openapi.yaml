openapi: 3.1.0
info:
  title: BIPC
  description: Iterative Benchmark for Low-Carbon Projects
  version: 1.0.0
security:
  - apiKeyAuthentication: []
  - bearerHttpAuthentication: []
tags:
  - name: users
  - name: invitations
  - name: tokens
  - name: projects
servers:
  - url: https://bipc.org.br/v1

paths:
  /users:
    post:
      summary: Register a new user
      description: Creates a new user account. After registration, an activation token is sent to the user's email.
      security: []
      tags: [users]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUser"
      responses:
        "202":
          description: Accepted. The user was successfully registered and an activation email has been sent.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "400":
          description: Bad Request. The request body is invalid or malformed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: Unprocessable Entity. The request failed validation checks (e.g., duplicate email).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal Server Error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      summary: Update user details
      description: Updates the details for the currently authenticated user. Requires authentication.
      tags: [users]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUser"
      responses:
        "200":
          description: OK. The user was successfully updated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "400":
          description: Bad Request. The request body is invalid or malformed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized. The user is not authenticated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Conflict. A conflicting edit occurred.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: Unprocessable Entity. The request failed validation checks (e.g., duplicate email).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal Server Error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      summary: Delete user account
      description: Deletes the currently authenticated user's account. To delete the account it is necessary to delete or transfer the projects.
      tags: [users]
      responses:
        "200":
          description: OK. The user was successfully deleted.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DefaultOkResponse"
        "403":
          description: Forbidden. The user cannot be deleted because they have associated projects.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized. The user is not authenticated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal Server Error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /users/activated:
    put:
      summary: Activate a user
      description: Activates a user account using a token sent to their email.
      security: []
      tags: [users]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - token
              properties:
                token:
                  type: string
      responses:
        "200":
          description: OK. User successfully activated.
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: "#/components/schemas/User"
        "400":
          description: Bad Request. The request body is invalid or malformed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Conflict. A conflicting edit occurred.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: Unprocessable Entity. The token is invalid or has expired.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal Server Error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /users/password:
    put:
      summary: Update user password
      description: Updates the password for a user, typically used in a password reset flow.
      security: []
      tags: [users]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - password
                - token
              properties:
                password:
                  type: string
                  format: password
                  description: The new password. Must be at least 8 bytes long.
                token:
                  type: string
      responses:
        "200":
          description: OK. Password successfully updated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DefaultOkResponse"
        "400":
          description: Bad Request. The request body is invalid or malformed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Conflict. A conflicting edit occurred.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: Unprocessable Entity. The token is invalid or has expired.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal Server Error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /users/collaborators:
    get:
      summary: List user collaborators
      description: Returns a list of users who have been invited to collaborate on the authenticated user's projects.
      tags: [users]
      responses:
        "200":
          description: A list of collaborators.
          content:
            application/json:
              schema:
                type: object
                required:
                  - users
                properties:
                  users:
                    type: array
                    items:
                      $ref: "#/components/schemas/User"
        "401":
          description: Unauthorized. The user is not authenticated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal Server Error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /users/pending-invitations:
    get:
      summary: List pending invitations
      description: Returns a list of pending invitations for the authenticated user.
      tags: [invitations]
      responses:
        "200":
          description: A list of pending invitations.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InvitationsWithDetails"
        "401":
          description: Unauthorized. The user is not authenticated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal Server Error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /users/reply/{invitationID}:
    put:
      summary: Reply to an invitation
      description: Accepts or declines an invitation to collaborate on a project.
      tags: [invitations]
      parameters:
        - name: invitationID
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - status
              properties:
                status:
                  type: string
                  enum:
                    - accepted
                    - declined
      responses:
        "403":
          description: Forbidden. account must be activated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized. The user is not authenticated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: Unprocessable Entity. The request failed validation checks
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "400":
          description: Bad Request. The request body is invalid or malformed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal Server Error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "200":
          description: OK. Invitation response recorded successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DefaultOkResponse"

  /tokens/authentication:
    post:
      summary: Create authentication token
      description: Authenticates a user and returns a JWT token.
      security: []
      tags: [tokens]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                  format: password
      responses:
        "400":
          description: Bad Request. The request body is invalid or malformed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: Unprocessable Entity. The request failed validation checks.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized. Invalid credentials.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal Server Error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "201":
          description: Created. Token successfully created.
          content:
            application/json:
              schema:
                type: object
                required:
                  - authentication_token
                  - user
                properties:
                  authentication_token:
                    type: object
                    required:
                      - token
                      - expiry
                    properties:
                      token:
                        type: string
                      expiry:
                        type: string
                        format: date-time
                  user:
                    $ref: "#/components/schemas/User"

  /tokens/activation:
    post:
      summary: Resend activation token
      description: Resends the activation token to the user's email.
      security: []
      tags: [tokens]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
              properties:
                email:
                  type: string
                  format: email
      responses:
        "202":
          description: OK. Activation email resent successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DefaultOkResponse"
        "400":
          description: Bad Request. The request body is invalid or malformed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: Unprocessable Entity. The request failed validation checks.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal Server Error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /tokens/password-reset:
    post:
      summary: Create password reset token
      description: Sends a password reset token to the user's email.
      security: []
      tags: [tokens]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
              properties:
                email:
                  type: string
                  format: email
      responses:
        "400":
          description: Bad Request. The request body is invalid or malformed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: Unprocessable Entity. The request failed validation checks.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal Server Error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "202":
          description: Accepted. Password reset email sent successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DefaultOkResponse"

  /tokens/api-key:
    post:
      summary: Create API key
      description: Generates a new API key for the authenticated user.
      tags: [tokens]
      responses:
        "403":
          description: Forbidden. account must be activated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized. The user is not authenticated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal Server Error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "201":
          description: Created. API key successfully created.
          content:
            application/json:
              schema:
                type: object
                required:
                  - api_key
                properties:
                  api_key:
                    type: string
                    readOnly: true

  /projects:
    post:
      summary: Create new project
      description: Creates a new project for the authenticated user.
      tags: [projects]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProject"
      responses:
        "403":
          description: Forbidden. account must be activated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized. The user is not authenticated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "400":
          description: Bad Request. The request body is invalid or malformed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: Unprocessable Entity. The request failed validation checks.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal Server Error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "201":
          description: Created. The project was successfully created.
          content:
            application/json:
              schema:
                type: object
                required:
                  - project
                properties:
                  project:
                    $ref: "#/components/schemas/Project"
    get:
      summary: List all projects
      description: Returns a paginated list of projects for the authenticated user.
      tags: [projects]
      parameters:
        - name: name
          in: query
          required: false
          schema:
            type: string
        - name: page
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 10000000
        - name: page_size
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 50
        - name: sort
          in: query
          required: false
          schema:
            type: string
            enum:
              [
                "id",
                "created_at",
                "name",
                "state",
                "city",
                "phase",
                "-id",
                "-created_at",
                "-name",
                "-state",
                "-city",
                "-phase",
              ]
      responses:
        "401":
          description: Unauthorized. The user is not authenticated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: Unprocessable Entity. The request failed validation checks.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal Server Error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "200":
          description: Created. The project was successfully created.
          content:
            application/json:
              schema:
                type: object
                required:
                  - projects
                  - metadata
                properties:
                  projects:
                    type: array
                    items:
                      $ref: "#/components/schemas/ProjectWithUnits"
                  metadata:
                    type: object
                    required:
                      - current_page
                      - page_size
                      - first_page
                      - last_page
                      - total_records
                    properties:
                      current_page:
                        type: integer
                      page_size:
                        type: integer
                      first_page:
                        type: integer
                      last_page:
                        type: integer
                      total_records:
                        type: integer

  /projects/{projectID}:
    get:
      summary: Get a project by ID
      description: Retrieves the details of a specific project.
      tags: [projects]
      parameters:
        - name: projectID
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "403":
          description: Forbidden. account must be activated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized. The user is not authenticated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not Found. The requested project does not exist.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal Server Error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "200":
          description: A single project.
          content:
            application/json:
              schema:
                type: object
                required:
                  - project
                properties:
                  project:
                    $ref: "#/components/schemas/ProjectWithUnits"
    patch:
      summary: Update a project
      description: Updates the details of a specific project.
      tags: [projects]
      parameters:
        - name: projectID
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProject"
      responses:
        "422":
          description: Unprocessable Entity. The request failed validation checks.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal Server Error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden. account must be activated or user does not have permission.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized. The user is not authenticated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not Found. The requested project does not exist.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "400":
          description: Bad Request. The request body is invalid or malformed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Conflict. A conflicting edit occurred.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "200":
          description: OK. The project was successfully updated.
          content:
            application/json:
              schema:
                type: object
                required:
                  - project
                properties:
                  project:
                    $ref: "#/components/schemas/Project"
    delete:
      summary: Delete a project
      description: Deletes a specific project.
      tags: [projects]
      parameters:
        - name: projectID
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "422":
          description: Unprocessable Entity. The request failed validation checks.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal Server Error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden. account must be activated or user does not have permission.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized. The user is not authenticated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "200":
          description: OK. The project was successfully deleted.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DefaultOkResponse"

  /v1/projects/{projectID}/duplicate:
    post:
      summary: Duplicate a project (same owner)
      description: Creates a complete copy of an existing project including all its units, floors, options, modules, and roles. The duplicated project will have a new name with a numeric suffix (e.g., "Project (1)"), and all IDs will be newly generated. The current authenticated user becomes the owner of the duplicated project, and all original role members are preserved. Note that this endpoint does NOT allow changing the owner - use the transfer endpoint for cross-account duplication.
      tags: [projects]
      security:
        - bearerAuth: []
      parameters:
        - name: projectID
          in: path
          required: true
          description: ID of the project to duplicate
          schema:
            type: string
            format: uuid
      responses:
        "201":
          description: Created. The project was successfully duplicated.
          content:
            application/json:
              schema:
                type: object
                required:
                  - project
                properties:
                  project:
                    $ref: "#/components/schemas/ProjectWithUnits"
        "400":
          description: Bad Request. Invalid project ID format.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized. The user is not authenticated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden. Account must be activated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not Found. The project does not exist.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal Server Error. Failed to duplicate project or its resources.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/projects/{projectID}/invite:
    post:
      summary: Invite a user to a project
      description: Sends an invitation to a user to collaborate on a project.
      tags:
        - Invitations
      security:
        - bearerAuth: []
      parameters:
        - name: projectID
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  format: email
                permissions:
                  type: array
                  items:
                    type: string
      responses:
        "200":
          description: OK. Invitation sent successfully.
        "400":
          description: Bad Request. The request body is invalid or malformed.
        "401":
          description: Unauthorized. The user is not authenticated.
        "422":
          description: Unprocessable Entity. The request failed validation checks (e.g., user already a member, or pending invitation exists).
        "500":
          description: Internal Server Error.

  /v1/projects/{projectID}/units:
    post:
      summary: Create new unit
      description: Creates a new unit (e.g., a tower) within a project.
      tags:
        - Units
      security:
        - bearerAuth: []
      parameters:
        - name: projectID
          in: path
          required: true
          description: The ID of the project to add the unit to.
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UnitCreate"
      responses:
        "200":
          description: OK. The unit was created successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Unit"
        "400":
          description: Bad Request. The request body is invalid or malformed.
        "401":
          description: Unauthorized. The user is not authenticated.
        "422":
          description: Unprocessable Entity. The request failed validation checks.
        "500":
          description: Internal Server Error.

  /v1/projects/{projectID}/units/{unitID}:
    get:
      summary: Get a unit by ID
      description: Retrieves the details of a specific unit.
      tags:
        - Units
      security:
        - bearerAuth: []
      parameters:
        - name: projectID
          in: path
          required: true
          description: The ID of the project.
          schema:
            type: string
            format: uuid
        - name: unitID
          in: path
          required: true
          description: The ID of the unit to retrieve.
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: A single unit.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Unit"
        "401":
          description: Unauthorized. The user is not authenticated.
        "404":
          description: Not Found. The requested unit does not exist.
        "500":
          description: Internal Server Error.
    patch:
      summary: Update a unit
      description: Updates the details of a specific unit.
      tags:
        - Units
      security:
        - bearerAuth: []
      parameters:
        - name: projectID
          in: path
          required: true
          description: The ID of the project.
          schema:
            type: string
            format: uuid
        - name: unitID
          in: path
          required: true
          description: The ID of the unit to update.
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UnitCreate"
      responses:
        "200":
          description: OK. The unit was successfully updated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Unit"
        "400":
          description: Bad Request. The request body is invalid or malformed.
        "401":
          description: Unauthorized. The user is not authenticated.
        "404":
          description: Not Found. The requested unit does not exist.
        "409":
          description: Conflict. A conflicting edit occurred.
        "422":
          description: Unprocessable Entity. The request failed validation checks.
        "500":
          description: Internal Server Error.
    delete:
      summary: Delete a unit
      description: Deletes a specific unit.
      tags:
        - Units
      security:
        - bearerAuth: []
      parameters:
        - name: projectID
          in: path
          required: true
          description: The ID of the project.
          schema:
            type: string
            format: uuid
        - name: unitID
          in: path
          required: true
          description: The ID of the unit to delete.
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: OK. The unit was successfully deleted.
        "401":
          description: Unauthorized. The user is not authenticated.
        "404":
          description: Not Found. The requested unit does not exist.
        "500":
          description: Internal Server Error.

  /v1/projects/{projectID}/units/{unitID}/duplicate:
    post:
      summary: Duplicate an existing unit with all its options and modules
      description: Creates a copy of an existing unit with all its floors, options, and modules. All entities are created with new IDs. Floor indexes are preserved (floor index 0 becomes floor index 0 in the new unit). Modules associated with specific floors are mapped to the corresponding floor indexes in the new unit. The active option state is preserved. If the original name ends with " (number)", the number is incremented; otherwise, " (1)" is appended to the name.
      tags:
        - Units
      security:
        - bearerAuth: []
      parameters:
        - name: projectID
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: The ID of the project
        - name: unitID
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: The ID of the unit to duplicate
      responses:
        "201":
          description: Unit successfully duplicated with all its floors, options, and modules
          content:
            application/json:
              schema:
                type: object
                properties:
                  unit:
                    $ref: "#/components/schemas/Unit"
        "400":
          description: Bad Request. Invalid project or unit ID.
        "404":
          description: Not Found. The original unit does not exist.
        "500":
          description: Internal Server Error.

