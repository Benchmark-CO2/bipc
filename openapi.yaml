openapi: 3.0.0
info:
  title: Structures
  version: 1.0.0

paths:
  /unit:
    post:
      summary: Create new unit
      description: >
        Creates a new unit linked to a project.

        The `type` field determines which additional fields are required:

        - **Tower**: requires the fields from the `Tower` table, such as `total_floors`, `total_area`, etc.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUnit'
            examples:
              tower:
                summary: Unit type Tower
                value:
                  project_id: 123
                  type: Tower
                  total_floors: 15
                  tower_floors: 10
                  base_floors: 2
                  basement_floors: 2
                  type_floors: 6
                  total_area: 12500.75
      responses: 
        '200':
          description: Successfully created

  /modules:
    post:
      summary: Create new module
      description: >
        Creates a new module linked to a tower.

        The `structure_type` field determines which additional fields must be sent:

        - **Beam Column**:
          - `concrete_columns`, `concrete_beams`, `concrete_slabs` (list with volume and fck)
          - `steel_ca50`, `steel_ca60` (steel quantity)
          - `form_columns`, `form_beams`, `form_slabs`, `form_total` (form areas)
          - `column_number`, `avg_beam_span`, `avg_slab_span`

        - **Concrete Wall**:
          - `concrete_walls`, `concrete_slabs` (list with volume and fck)
          - `steel_ca50`, `steel_ca60` (steel quantity)
          - `wall_thickness`, `slab_thickness`, `form_area`, `wall_area`

        - **Structural Masonry**:
          - `vertical_grout`, `horizontal_grout` (list with volume and fck)
          - `steel_ca50`, `steel_ca60` (steel quantity)
          - `blocks` (list with type, fbk and quantity)

        The backend will validate the fields according to the value of `structure_type`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateModule'
            examples:
              beamColumn:
                summary: Structure type "Beam Column"
                value:
                  unit_id: 1
                  name: Floor Type A
                  structure_type: beam_olumn
                  floor_repetition: 5
                  floor_area: 1350.5
                  floor_height: 3.2
                  concrete_columns:
                    - fck: "30"
                      volume: 10.5
                  concrete_beams:
                    - fck: "30"
                      volume: 12.0
                  concrete_slabs:
                    - fck: "25"
                      volume: 14.0
                  steel_ca50: 1200
                  steel_ca60: 300
                  form_columns: 200
                  form_beams: 350
                  form_slabs: 450
                  form_total: 1000
                  column_number: 24
                  avg_beam_span: 7
                  avg_slab_span: 6

              concreteWall:
                summary: Structure type "Concrete Wall"
                value:
                  unit_id: 2
                  name: Basement
                  structure_type: concrete_wall
                  floor_repetition: 1
                  floor_area: 800.0
                  floor_height: 3.0
                  concrete_walls:
                    - fck: "30"
                      volume: 8.0
                  concrete_slabs:
                    - fck: "30"
                      volume: 6.5
                  steel_ca50: 1000
                  steel_ca60: 250
                  wall_thickness: 0.15
                  slab_thickness: 0.18
                  form_area: 300
                  wall_area: 250

              structuralMasonry:
                summary: Structure type "Structural Masonry"
                value:
                  unit_id: 3
                  name: Tower B
                  structure_type: structural_masonry
                  floor_repetition: 8
                  floor_area: 1100.0
                  floor_height: 2.8
                  vertical_grout:
                    - fck: "25"
                      volume: 5.5
                  horizontal_grout:
                    - fck: "25"
                      volume: 2.2
                  steel_ca50: 950
                  steel_ca60: 400
                  blocks:
                    - type: BL 14x19
                      fbk: "06"
                      quantity: 1200
                    - type: CL 14x34
                      fbk: "04"
                      quantity: 800
      responses:
        '200':
          description: Successfully created

components:
  schemas:
    Concrete:
      type: array
      description: >
        List of concrete volumes by Fck value. Must have at least one item. There must be no repeated 'fck' values.
      minItems: 1
      items:
        type: object
        properties:
          fck:
            type: string
            enum: ["20", "25", "30", "35", "40", "45"]
            example: "30"
          volume:
            type: number
            format: float
        required: [fck, volume]

    Block:
      type: array
      description: >
        List of blocks by Fbk value. Must have at least one item. There must be no repeated 'fbk' values.
      minItems: 1
      items:
        type: object
        properties:
          type:
            type: string
            enum:
              - "BL 14x4"
              - "BL 14x19"
              - "BL 14x34"
              - "BL 14x39"
              - "BL 14x54"
              - "BL 19x4"
              - "BL 19x19"
              - "BL 19x39"
              - "CL 14x19"
              - "CL 14x34"
              - "CL 14x14"
              - "CL 14x39"
              - "CL 19x19"
              - "CL 19x39"
              - "COMP 14x19"
              - "COMP 14x39"
              - "JOTA 14 x 39 x 19/9"
              - "JOTA 14 x 19 x 19/9"
          fbk:
            type: string
            enum: ["02", "04", "06", "08", "10", "12"]
          quantity:
            type: integer
        required: [type, fbk, quantity]

    BeamColumn:
      type: object
      description: Beam Column
      properties:
        concrete_columns:
          $ref: '#/components/schemas/Concrete'
        concrete_beams:
          $ref: '#/components/schemas/Concrete'
        concrete_slabs:
          $ref: '#/components/schemas/Concrete'
        steel_ca50:
          type: number
        steel_ca60:
          type: number
        form_columns:
          type: number
        form_beams:
          type: number
        form_slabs:
          type: number
        form_total:
          type: number
        column_number:
          type: integer
        avg_beam_span:
          type: integer
        avg_slab_span:
          type: integer
      required:
        - concrete_columns
        - concrete_beams
        - concrete_slabs
        - steel_ca50
        - steel_ca60

    ConcreteWall:
      type: object
      description: Concrete Wall
      properties:
        concrete_walls:
          $ref: '#/components/schemas/Concrete'
        concrete_slabs:
          $ref: '#/components/schemas/Concrete'
        steel_ca50:
          type: number
        steel_ca60:
          type: number
        wall_thickness:
          type: number
        slab_thickness:
          type: number
        form_area:
          type: number
        wall_area:
          type: number
      required:
        - concrete_walls
        - concrete_slabs
        - steel_ca50
        - steel_ca60

    StructuralMasonry:
      type: object
      description: Structural Masonry
      properties:
        vertical_grout:
          $ref: '#/components/schemas/Concrete'
        horizontal_grout:
          $ref: '#/components/schemas/Concrete'
        steel_ca50:
          type: number
        steel_ca60:
          type: number
        blocks:
          $ref: '#/components/schemas/Block'
      required:
        - vertical_grout
        - horizontal_grout
        - steel_ca50
        - steel_ca60
        - blocks

    BasicModuleData:
      type: object
      properties:
        unit_id:
          type: integer
        name:
          type: string
        structure_type:
          type: string
          enum:
            - "beam_column"
            - "concrete_wall"
            - "structural_masonry"
        floor_repetition:
          type: integer
        floor_area:
          type: number
          format: float
        floor_height:
          type: number
          format: float
      required:
        - unit_id
        - name
        - structure_type
        - floor_repetition
        - floor_area
        - floor_height

    CreateModule:
      allOf:
        - $ref: '#/components/schemas/BasicModuleData'
        - oneOf:
            - $ref: '#/components/schemas/BeamColumn'
            - $ref: '#/components/schemas/ConcreteWall'
            - $ref: '#/components/schemas/StructuralMasonry'
